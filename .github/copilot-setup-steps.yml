name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            ZombieForge\ZombieForge.csproj
            ZombieForge.slnx

      - name: Restore ZombieForge project
        run: dotnet restore .\ZombieForge\ZombieForge.csproj --nologo

      - name: Restore solution dependencies
        run: dotnet restore .\ZombieForge.slnx --nologo
